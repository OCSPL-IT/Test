<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <div class="max-w-4xl mx-auto px-4 py-10">
        <div class="bg-white shadow-lg rounded-2xl border border-slate-200 p-6">
            <h1 class="text-2xl font-bold mb-6">Student Entry Form</h1>

            <form method="post" class="space-y-4">
                {% csrf_token %}

                <div>
                    <label class="block text-sm font-medium mb-1">Name</label>
                    {{ form.name }}
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">Email</label>
                    {{ form.email }}
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">City</label>
                    {{ form.city }}
                </div>

                <button type="submit"
                        class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg shadow">
                    Save
                </button>
            </form>

            <h2 class="text-xl font-semibold mt-10 mb-4">Student List</h2>

            <div class="overflow-x-auto">
                <table class="min-w-full border border-slate-200 rounded-lg overflow-hidden">
                    <thead class="bg-slate-100">
                        <tr>
                            <th class="px-4 py-3 text-left border-b">ID</th>
                            <th class="px-4 py-3 text-left border-b">Name</th>
                            <th class="px-4 py-3 text-left border-b">Email</th>
                            <th class="px-4 py-3 text-left border-b">City</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for student in students %}
                        <tr class="hover:bg-slate-50">
                            <td class="px-4 py-3 border-b">{{ student.id }}</td>
                            <td class="px-4 py-3 border-b">{{ student.name }}</td>
                            <td class="px-4 py-3 border-b">{{ student.email }}</td>
                            <td class="px-4 py-3 border-b">{{ student.city }}</td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="4" class="px-4 py-4 text-center text-slate-500">No records found.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
